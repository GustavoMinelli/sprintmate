# SprintMate configuration example.
# Copy to your user config dir (run `sprintmate config` to generate it via the
# TUI wizard instead of editing by hand):
#   Linux:   ~/.config/sprintmate/config.yaml
#   macOS:   ~/Library/Application Support/sprintmate/config.yaml
#   Windows: %AppData%\sprintmate\config.yaml

jira:
  host: https://company.atlassian.net
  email: you@company.com
  token: xxxxx                 # or set the SPRINTMATE_JIRA_TOKEN env var

  # --- configurable issue source (board / columns / sprint) ---
  board: "Sprint Board"        # board name or id; leave empty to use raw `jql`
  sprint: active               # active | future | all | <sprintId>
  columns: ["To Do", "In Progress"]   # board columns to pull; empty = all columns
  assignee: currentUser        # currentUser | <accountId> | all

  # --- advanced: full override (ignores board/columns/sprint above) ---
  jql: ""                      # e.g. "assignee = currentUser() AND status != Done ORDER BY priority DESC"

  # optional custom field overrides; auto-discovered when omitted
  fields: {}
  #  sprint: customfield_10020
  #  story_points: customfield_10016

  # --- write-back to Jira on launch (opt-in; off by default) ---
  on_launch:
    comment: false             # post a "started via SprintMate" note on the issue
    transition: ""             # move the issue to this status on launch, e.g. "In Progress"

agent:
  default: claude

agents:                        # each agent's command is configurable
  claude:
    command: claude
    # --permission-mode plan boots Claude Code into plan mode: it presents a
    # plan before editing. placeholders: {context_file} {key} {branch} {dir}
    args: ["--permission-mode", "plan", "{context_file}"]
  codex:
    command: codex
    args: []

launch:
  strategy: auto               # auto | tmux | window | inplace
  # tmux/window open the agent in its own pane/window and keep the dashboard
  # open so you can launch more issues; inplace replaces this terminal.

git:
  create_branch: true
  branch_pattern: "{key}-{slug}"   # e.g. demo-123-fix-social-login
  use_worktrees: false             # run each issue in its own git worktree (parallel-safe)
  # worktree_base: ""              # where worktrees live; empty = sibling .sprintmate-worktrees/

context:                       # tunes the generated .issue-context.md
  plan_first: true             # prepend "investigate and plan before editing" instructions
  # preamble: ""               # custom instructions block (overrides plan_first text)

ship:                          # actions when you approve & ship from the review screen (opt-in)
  push_branch: false           # git push -u origin <branch>
  create_pr: false             # open a PR via the GitHub CLI (gh)
  base: ""                     # PR base branch; empty = repo default
  comment: false               # post the PR link back on the issue
  transition: ""               # move the issue to this status after shipping, e.g. "In Review"

queue:                         # autonomous (headless) run queue
  concurrency: 2               # how many agent jobs run at once
  auto_approve: false          # run the execute phase without the review gate (off = review each plan)

notify:                        # completion notifications for autonomous runs
  bell: true                   # ring the terminal bell
  os: false                    # desktop notification (osascript / notify-send)
  # webhook_url: ""            # POST {title, body} JSON on completion

keys:                          # configurable keybindings
  up: ["up", "k"]
  down: ["down", "j"]
  launch: ["enter"]
  switch_agent: ["tab"]
  refresh: ["r"]
  open_browser: ["o"]
  search: ["/"]
  settings: ["s"]
  quit: ["q", "ctrl+c"]
  enqueue: ["e"]               # dashboard: queue a headless run
  monitor: ["m"]               # dashboard: open the queue monitor
  approve: ["a"]               # monitor/review: approve the plan gate
  ship: ["S"]                  # review: ship (push / PR / write-back)
  tab: ["tab"]                 # review: switch Plan/Diff tab
  back: ["esc"]                # monitor/review: go back

# working directory: where the agents are opened (every issue runs here)
workdir: ~/Documents/projects
